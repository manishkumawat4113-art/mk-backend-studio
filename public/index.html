<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>MK Backend Studio 2.0 🚀</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; padding: 20px; display: flex; justify-content: center; }
    .card { width: 100%; max-width: 600px; background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    h1 { color: #38bdf8; font-size: 24px; text-align: center; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
    .badge { background: #0369a1; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
    .endpoint-box { background: #090d16; padding: 12px; border-radius: 8px; border-left: 4px solid #38bdf8; font-family: monospace; font-size: 13px; margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-top: 15px; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #0f172a; border: 1px solid #475569; color: #38bdf8; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 15px; background: #0284c7; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    button:hover { background: #0369a1; }
    #output { margin-top: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MK Backend Studio 2.0</h1>
    <p class="subtitle">Permanent WhatsApp Engine & Custom APIs <span class="badge">MongoDB Connected</span></p>

    <div class="endpoint-box">
      <b>🚀 Built-in Active Endpoints:</b><br>
      • Signup: <code>POST /api/auth/register</code><br>
      • Login: <code>POST /api/auth/login</code><br>
      • Logout: <code>POST /api/auth/logout</code><br>
      • Live Socket.io Engine: <code>Active</code>
    </div>

    <label>Make Custom Link (Saved in MongoDB):</label>
    <input type="text" id="routeName" placeholder="Endpoint name (e.g. products, config)">

    <label>JSON Response Data:</label>
    <textarea id="responseData" rows="4" placeholder='{"status": "active"}'></textarea>

    <button onclick="saveRoute()">Create Instant Link</button>
    <div id="output"></div>
  </div>

  <script>
    async function saveRoute() {
      const routeName = document.getElementById('routeName').value.trim();
      const rawData = document.getElementById('responseData').value.trim();

      if (!routeName || !rawData) return alert("Fields fill karein!");

      try {
        const responseData = JSON.parse(rawData);
        const res = await fetch('/studio/save-route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ routeName, responseData })
        });
        const data = await res.json();
        const liveUrl = `${window.location.origin}/api/custom/${routeName}`;

        document.getElementById('output').innerHTML = `
          <div class="endpoint-box" style="border-left-color: #4ade80;">
            <b style="color:#4ade80;">✅ Success! Active Link:</b><br>
            <a href="${liveUrl}" target="_blank" style="color:#38bdf8;">${liveUrl}</a>
          </div>
        `;
      } catch (err) {
        alert("Invalid JSON format!");
      }
    }
  </script>
</body>
</html>
