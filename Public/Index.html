<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MK Backend Studio 🚀</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 600px; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
    h1 { color: #38bdf8; text-align: center; margin-bottom: 20px; }
    label { font-weight: 600; display: block; margin-top: 15px; margin-bottom: 5px; color: #cbd5e1; }
    input, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: #38bdf8; font-family: monospace; font-size: 14px; }
    input:focus, textarea:focus { outline: none; border-color: #38bdf8; }
    button { width: 100%; margin-top: 20px; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #0369a1; }
    #output { margin-top: 20px; padding: 15px; background: #090d16; border-radius: 8px; border-left: 4px solid #38bdf8; word-break: break-all; font-family: monospace; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MK Backend Studio 🚀</h1>

    <label>1. Endpoint Name (Short Link ID):</label>
    <input type="text" id="routeName" placeholder="e.g. users, products, mydata">

    <label>2. Response JSON Data:</label>
    <textarea id="responseData" rows="8" placeholder='{
  "status": "success",
  "users": ["Rahul", "Aman", "MK"]
}'></textarea>

    <button onclick="createEndpoint()">Generate Live API Link</button>

    <div id="output"></div>
  </div>

  <script>
    async function createEndpoint() {
      const routeName = document.getElementById('routeName').value.trim();
      const rawData = document.getElementById('responseData').value.trim();
      const output = document.getElementById('output');

      if (!routeName || !rawData) {
        alert("Dono fields bharna zaroori hai!");
        return;
      }

      try {
        const responseData = JSON.parse(rawData);
        const res = await fetch('/studio/save-route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ routeName, responseData })
        });

        const data = await res.json();
        const liveUrl = `${window.location.origin}/api/${routeName}`;

        output.style.display = 'block';
        output.innerHTML = `
          <b style="color:#4ade80;">✅ API Active Ho Gayi!</b><br><br>
          <b>Tumhara Live Backend Link:</b><br>
          <a href="${liveUrl}" target="_blank" style="color:#38bdf8;">${liveUrl}</a>
        `;
      } catch (err) {
        alert("Invalid JSON format! Kripya valid JSON data dalein.");
      }
    }
  </script>
</body>
</html>
